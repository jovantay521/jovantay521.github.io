<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>

  <!-- bootstrap css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{url_for('static', filename='css/website.css')}}">
  <!-- onemap leafletjs map -->
  <link rel="stylesheet" href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css">
  <script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/polyline-encoded@0.0.9/Polyline.encoded.min.js"></script>
</head>

<body>
  <div id="userInput">
    <form id="input-form">
      <select id="routeType" name="type">
        <option value="pt">Public Transport</option>
        <option value="drive">Drive</option>
      </select>
      <br>
      <input type="text" id="srcInput" name="start" placeholder="Enter your address">
      <br>
      <input type="text" id="dstInput" name="end" placeholder="Enter your destination">
      <ul id="autocomplete"></ul>
      <br>
      <button type="submit" id="calBtn">Enter</button>
    </form>

    <div id="routeData" , style="float: right; width:150px;">
      {% for data in routeSteps %}
      <div class="routeSteps" style="float: right;">
        {{ data }}
      </div>
      {% endfor %}
    </div>

  </div>


  <div id="map"></div>
  <script src="{{url_for('static',filename='js/map.js')}}"></script>
  <script src="{{url_for('static', filename='js/route_planner.js')}}"></script>
</body>

</html>
