<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
  <!-- bootstrap css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
      .content-wrapper{
        height: 100vh;
        background-color: rgb(54, 54, 71);

      }
      .nav-link {
        position: absolute;
        height: 50px;
        width: 75px;
        padding: 15px;
        border-radius: 0 0 10px 0; 
        background-color: rgb(50, 65, 129);
        color: rgb(255, 255, 255);
        font-family: Arial, sans-serif;
      }
      .sign-up {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        height: 300px;
        width: 500px;
        padding: 70px;
        background-color: rgb(50, 65, 129);
        border-radius: 15px;
        color: rgb(255, 255, 255);
      }

      .username-box,
      .password-box,
      .reset-password-button,
      .sign-up-button {
        display: inline-block;
        margin-bottom: 5px;
      }

      button.btn.btn  {
        margin: 5px;
        background-color: rgb(120, 121, 211);
        width: 100%;
        color: #ffffff;
      }

      .reset-password-button,
      .sign-up-button{
        color: rgb(176, 166, 204);
      }
      </style>
  </head>

  <body>
    <div class="header">
      <div class="left-section">
        <a class="nav-link" href="/route-planner">
          <img class="back-arrow-image" src="{{url_for('static', filename='../images/back-arrow.png')}}" alt="">
          Back
        </a>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="sign-up-container">
        <div class="sign-up">          
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <ul class="flashes">
              {% for message in messages %}
              {{ message }}
              {% endfor %}
              </ul>
            {% endif %}
          {% endwith %}
          <form method="post" action="/accLogin">
  
            <div class="username-box">
              <label for="email">Email:</label>
              <input id="email" class="username-textbox" type="text" name="email" placeholder="Email">
            </div>
            <div class="password-box">
              <label for="password">Password:</label>
              <input id="password" class="password-textbox" type="password" name="password" placeholder="Password">
            </div>
            <div>
            <button type="button" class="btn btn">Login</button>
            </div>
          </form>

          <a class="reset-password-button" href="/reset">Forgot your password?</a>
          <a class="sign-up-button" href="/signup">Don't have an account? Sign up here</a>
<!--          <button id="signupBtn" class="sign-up-button">Don't have an account? Sign up here</button>-->
        </div>
      </div>
    </div>
  </body>

</html>
