<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Map</title>

  <!-- website map display css -->
  <link rel="stylesheet" href="{{url_for('static', filename='css/map.css')}}">
  <!-- bootstrap css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- onemap leaflet -->
  <link rel="stylesheet" href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css">
  <script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>
</head>

  <body>
    <div class="header">
      <div class="left-section">
        <a class="nav-link" href="/route-planner">
          <img class="back-arrow-image" src="{{url_for('static', filename='../images/back-arrow.png')}}" alt="">
          Back
        </a>
      </div>
    </div>

    <div class="content-wrapper">
      <div class="sign-up-container">
        <div class="sign-up">          
          {% with messages = get_flashed_messages() %}
            {% if messages %}
              <ul class="flashes">
              {% for message in messages %}
              {{ message }}
              {% endfor %}
              </ul>
            {% endif %}
          {% endwith %}
          <form method="post" action="/accLogin">
  
            <div class="username-box">
              <label for="email">Email:</label>
              <input id="email" class="username-textbox" type="text" name="email" placeholder="Email">
            </div>
            <div class="password-box">
              <label for="password">Password:</label>
              <input id="password" class="password-textbox" type="password" name="password" placeholder="Password">
            </div>
            <div>
            <button type="button" class="btn btn">Login</button>
            </div>
          </form>

          <a class="reset-password-button" href="/reset">Forgot your password?</a>
          <a class="sign-up-button" href="/signup">Don't have an account? Sign up here</a>
<!--          <button id="signupBtn" class="sign-up-button">Don't have an account? Sign up here</button>-->
        </div>
      </div>
    </div>
  </body>

</html>
