<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG Map</title>

    <link rel="stylesheet" href="{{url_for('static', filename='css/map.css')}}">
    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- onemap leaflet -->
    <link rel="stylesheet" href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css">
    <script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>
  </head>

  <body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <!-- website logo -->
        <a class="navbar-brand" href="/route-planner">
          <img src="{{url_for('static', filename='images/singapore-flag.png')}}" alt="singapore-flag" width="auto"
            height="30" class="d-inline-block align-middle">
          Map
        </a>
        <!-- end of website logo -->

        <!-- nav -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggler"
          aria-controls="navbarToggler" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarToggler">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="/route-planner">Route Planner</a>
            </li>
  <!--          <li class="nav-item">-->
  <!--            <a class="nav-link active" aria-current="page" href="/bus-explorer">Bus Explorer</a>-->
  <!--          </li>-->
          </ul>

          <!-- log out button only appears if user is logged in (tracked by session)-->
          {% if 'email' in session %}
          <li class="nav-item" style="list-style-type: none;">
            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas" data-bs-target="#savedroute-menu" aria-controls="savedroute-menu">Saved Route</button>
          </li>
          <li class="nav-item" style="list-style-type: none;">
            <a id= "logout-btn" class="btn btn-primary " href="/logout" role="button">Log out</a>
          </li>
            {% else %}
          <a class="btn btn-primary" href="/login" role="button">Login</a>
          {% endif %}

        </div>
      </div>
        <!-- end of nav -->
    </nav>
    <!-- end of navbar -->

    <!-- saved route menu -->
    <div class="offcanvas offcanvas-end" id="savedroute-menu" style="width: 40%;" >
      <div class="offcanvas-header">
        <h5>Saved Route</h5>
        <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="savedroute-menu"></button>
      </div>

      <div class="offcanvas-body">
        <!--  input here -->
      </div>
    </div>

    <!-- map display -->
    <div id="map"></div>
    <script src="{{url_for('static',filename='js/map.js')}}"></script>
    <!-- end of map display -->

    <!-- scripts -->
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- polyline js -->
    <script src="https://cdn.jsdelivr.net/npm/polyline-encoded@0.0.9/Polyline.encoded.min.js"></script>
    <script src="{{url_for('static', filename='js/route-planner.js')}}"></script>
  </body>

</html>
