<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Map</title>

  <!-- website map display css -->
  <link rel="stylesheet" href="{{url_for('static', filename='css/map.css')}}">
  <!-- bootstrap css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- onemap leaflet -->
  <link rel="stylesheet" href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css">
  <script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>

  <style>
    /* Custom CSS to center the card */
    .center-card {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* Adjust as needed */
    }
  </style>
</head>

<body>
  <!-- navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary" style="z-index: 4;">
    <div class="container-fluid">
      <!-- website logo -->
      <a class="navbar-brand" href="/route-planner">
        <img src="{{url_for('static', filename='images/singapore-flag.png')}}" alt="singapore-flag" width="auto"
          height="30" class="d-inline-block align-middle">
        Map
      </a>

      <!-- nav -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggler"
        aria-controls="navbarToggler" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarToggler">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/route-planner">Route Planner</a>
          </li>
<!--          <li class="nav-item">-->
<!--            <a class="nav-link" href="/bus-explorer">Bus Explorer</a>-->
<!--          </li>-->
        </ul>

        <!-- log out button only appears if user is logged in (tracked by session)-->
        {% if 'email' in session %}
        <a class="btn btn-primary" href="/login" role="button">Login</a>
        <a id="logout-btn" class="btn btn-primary " href="/logout" role="button">Log out</a>
        {% else %}
        <a class="btn btn-primary" href="/login" role="button">Login</a>
        {% endif %}

      </div>
      <!-- end of nav -->
    </div>
  </nav>
  <!-- end of navbar -->

    <div class="container"  style="display: flex; justify-content: center; align-items: center; margin-top: 20vh; width: 500px;">
      <div class="col">
        <div class="card mb-2">
          <div class="card-body">
          <form method="post" action="/accSignUp">
            <div class="mb-3">
              <label for="exampleInputUsername1" class="form-label">Username:</label>
              <input id="username" class="form-control" type="text" name="username" placeholder="Username">
            </div>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Email:</label>
              <input id="email" class="form-control" type="text" name="email" placeholder="Email">
            </div>
            <div class="mb-3">
              <label for="exampleInputPassword1" class="form-label">Password:</label>
              <input id="password" class="form-control" type="password" name="password" placeholder="Password">
            </div>

            <button class="btn btn-primary" style="width: 100%;">Sign Up</button>
          </form>

          <!-- warning messages -->
          {% with messages = get_flashed_messages() %}
          {% if messages %}
          <ul class="flashes">
            {% for message in messages %}
            {{ message }}
            {% endfor %}
          </ul>
          {% endif %}
          {% endwith %}
          <!-- end of warning messages -->

            <div class="card" style="width: 500px; margin-top: 20px;">
              <div class="card-body">
                <a class="sign-up-button" href="/login" style="display: flex; justify-content: center; align-items: center;">Have an account? Login here</a>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- end of sign up box -->
    </div>
  </body>

</html>
