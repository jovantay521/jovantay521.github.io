{% extends "layout.html" %}
{% block content %}
<div class="container"
  style="display: flex; justify-content: center; align-items: center; margin-top: 20vh; width: 500px;">
  <div class="col">
    <div class="card mb-2">
      <div class="card-body">
        <form method="post" action="/accSignUp">
          <div class="mb-3">
            <label for="exampleInputUsername1" class="form-label">Username:</label>
            <input id="username" class="form-control" type="text" name="username" placeholder="Username">
          </div>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email:</label>
            <input id="email" class="form-control" type="text" name="email" placeholder="Email">
          </div>
          <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label">Password:</label>
            <input id="password" class="form-control" type="password" name="password" placeholder="Password">
          </div>

          <button class="btn btn-primary" style="width: 100%;">Sign Up</button>
        </form>
      </div>
      <!-- warning messages -->
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      <ul class="flashes">
        {% for message in messages %}
        {{ message }}
        {% endfor %}
      </ul>
      {% endif %}
      {% endwith %}
      <!-- end of warning messages -->
    </div>
    <div class="card" style="width: 500px; margin-top: 20px;">
      <div class="card-body">
        <a class="sign-up-button" href="/login"
          style="display: flex; justify-content: center; align-items: center;">Have an account? Login here</a>
      </div>
    </div>
  </div>
  <!-- end of sign up box -->
</div>
{% endblock content %}
