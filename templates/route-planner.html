<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Map</title>

  <link rel="stylesheet" href="{{url_for('static', filename='css/map.css')}}">
  <!-- bootstrap css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- onemap leaflet -->
  <link rel="stylesheet" href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css">
  <script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>
</head>

<body>
  <!-- navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <!-- website logo -->
      <a class="navbar-brand" href="/route-planner">
        <img src="{{url_for('static', filename='images/singapore-flag.png')}}" alt="singapore-flag" width="auto"
          height="30" class="d-inline-block align-middle">
        Map
      </a>
      <!-- end of website logo -->

      <!-- nav -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggler"
        aria-controls="navbarToggler" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarToggler">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="{{ url_for('route_planner') }}">Route Planner</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('bus_explorer') }}">Bus Explorer</a>
          </li>
        </ul>

        <a class="btn btn-primary" href="#" role="button">Login</a>
      </div>
      <!-- end of nav -->
  </nav>
  <!-- end of navbar -->

  <!-- search box -->
  <div id="userInput" class="card mt-2 ms-2 p-2" style="width: 18rem;">
    <form id="input-form">
      <select class="form-select form-select mb-2" id="routeType" name="type">
        <option selected>Select Mode of Transport</option>
        <option value="pt">Public Transport</option>
        <option value="drive">Drive</option>
      </select>
      
      <div class="input-group mb-2">
        <input type="text" class="form-control" id="srcInput" name="start" placeholder="Enter your address">
        <!-- <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false"></button> -->
      </div>
      <div class="input-group mb-2">
        <input type="text" class="form-control" id="dstInput" name="end" placeholder="Enter your destination">
        <!-- <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false"></button> -->
      </div>
      <div class="d-grid">
        <button class="btn btn-primary btn-sm" type="submit" id="calBtn">Enter</button>
      </div>
    </form>
  </div>
  
  <ul id="autocomplete"></ul>
  
  <div id="routeData" , style="float: right; width:150px;">
    {% for data in routeSteps %}
    <div class="routeSteps" style="float: right;">
      {{ data }}
    </div>
    {% endfor %}
  </div>
  <!-- end of search box -->

  <!-- map display -->
  <div id="map"></div>
  <script src="{{url_for('static',filename='js/map.js')}}"></script>
  <!-- end of map display -->

  <!-- scripts -->
  <!-- bootstrap js -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- polyline js -->
  <script src="https://cdn.jsdelivr.net/npm/polyline-encoded@0.0.9/Polyline.encoded.min.js"></script>
  <script src="{{url_for('static', filename='js/route-planner.js')}}"></script>
</body>

</html>
