<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SG Map</title>
  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- website map display css -->
  <link rel="stylesheet" href="{{url_for('static', filename='css/map.css')}}">
  <!-- onemap leaflet -->
  <link rel="stylesheet" href="https://www.onemap.gov.sg/web-assets/libs/leaflet/leaflet.css">
  <script src="https://www.onemap.gov.sg/web-assets/libs/leaflet/onemap-leaflet.js"></script>
</head>

<body>
  
  <!-- navbar -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary" style="z-index: 5;">
    <div class="container-fluid">
      <!-- website logo -->
      <a class="navbar-brand" href="/route-planner">
        <img src="{{url_for('static', filename='images/singapore-flag.png')}}" alt="singapore-flag" width="auto"
          height="30" class="d-inline-block align-middle">
        Map
      </a>

      <!-- nav -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggler"
        aria-controls="navbarToggler" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarToggler">
        <ul class="navbar-nav me-auto">
          <!-- <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/route-planner">Route Planner</a>
          </li> -->
          <!-- <li class="nav-item">
            <a class="nav-link" href="/bus-explorer">Bus Explorer</a>
          </li> -->
        </ul>

        <!-- log out button only appears if user is logged in (tracked by session)-->
        {% if 'email' in session %}
        <li class="nav-item" style="list-style-type: none;">
          <button onclick="loadRoutes()" class="btn btn-primary me-2" type="button" data-bs-toggle="offcanvas"
            data-bs-target="#savedroute-menu" aria-controls="savedroute-menu">Saved Route</button>
        </li>
        <li class="nav-item" style="list-style-type: none;">
          <a id="logout-btn" class="btn btn-primary " href="/logout" role="button">Log out</a>
        </li>
        {% else %}
        <a class="btn btn-primary" href="/login" role="button">Login</a>
        {% endif %}
      </div>
      <!-- end of nav -->
    </div>
  </nav>
  <!-- end of navbar -->

  {% block content %}
  <!-- content -->
  {% endblock content %}

  <!-- scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
</body>

</html>
